<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow2" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1f2937" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="900" height="420" fill="#ffffff"/>

  <text x="450" y="55" font-family="Segoe UI, sans-serif" font-size="15" fill="#374151" text-anchor="middle" font-weight="600">cost of fetching page 200</text>

  <!-- OFFSET bar - long -->
  <rect x="130" y="100" width="640" height="46" rx="23" fill="#fff2e0" stroke="#f0a860" stroke-width="2.5" filter="url(#shadow2)"/>
  <text x="150" y="128" font-family="Segoe UI, sans-serif" font-size="14" fill="#7a4a12" font-weight="600">OFFSET 4000</text>
  <text x="740" y="128" font-family="Segoe UI, sans-serif" font-size="12" fill="#96601c" text-anchor="end">scans + discards 4000 rows first</text>

  <!-- keyset bar - short -->
  <rect x="130" y="180" width="150" height="46" rx="23" fill="#e9f7ee" stroke="#6fc790" stroke-width="2.5" filter="url(#shadow2)"/>
  <text x="150" y="208" font-family="Segoe UI, sans-serif" font-size="14" fill="#1f5c37" font-weight="600">keyset</text>
  <text x="300" y="208" font-family="Segoe UI, sans-serif" font-size="12" fill="#3f7d55">index seeks straight to the cursor</text>

  <!-- page 2 comparison -->
  <text x="450" y="270" font-family="Segoe UI, sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle" font-style="italic">for comparison — page 2</text>

  <rect x="130" y="290" width="60" height="30" rx="15" fill="#fff2e0" stroke="#f0a860" stroke-width="2" filter="url(#shadow2)"/>
  <rect x="130" y="330" width="55" height="30" rx="15" fill="#e9f7ee" stroke="#6fc790" stroke-width="2" filter="url(#shadow2)"/>
  <text x="210" y="310" font-family="Segoe UI, sans-serif" font-size="11" fill="#96601c">OFFSET — nearly identical to keyset here</text>
  <text x="205" y="350" font-family="Segoe UI, sans-serif" font-size="11" fill="#3f7d55">keyset — same cost as always</text>

  <text x="450" y="400" font-family="Segoe UI, sans-serif" font-size="14" fill="#6b7280" text-anchor="middle">
    The two look almost the same on page 2. The gap only shows up once real data piles up.
  </text>
</svg>
